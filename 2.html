<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
    <style>
        body { font-family: Arial; background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .calculator { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); width: 300px; }
        h2 { text-align: center; color: #2c3e50; }
        #display { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #3498db; border-radius: 5px; font-size: 20px; }
        .buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        button { padding: 20px; font-size: 18px; border: none; border-radius: 5px; background: #3498db; color: white; cursor: pointer; }
        button:hover { background: #2980b9; }
        .equal { grid-column: span 3; background: #27ae60; }
        .equal:hover { background: #229954; }
    </style>
</head>
<body>
    <div class="calculator">
        <h2>Calculator</h2>
        <input type="text" id="display" value="0">
        <div class="buttons">
            <button onclick="clearDisplay()">C</button>
            <button onclick="addOp('/')">/</button>
            <button onclick="addOp('*')">×</button>
            <button onclick="sqrtCalc()">√</button>
            <button onclick="addOp('%')">%</button>
            <button onclick="addOp('-')">-</button>
            <button onclick="squareCalc()">x²</button>
            <button onclick="addOp('**')">x^y</button>
            <button onclick="addOp('+')">+</button>
            <button onclick="calculate()" class="equal">=</button>
        </div>
    </div>
    <script>
        var display = document.getElementById('display');
        var current = '0';

        display.oninput = function() { current = display.value; }

        function addOp(op) {
            if (current === '0') current = '';
            current += op;
            display.value = current;
        }

        function clearDisplay() {
            current = '0';
            display.value = current;
        }

        function calculate() {
            try {
                current = eval(current).toString();
                display.value = current;
            } catch (e) {
                display.value = 'Error';
                current = '0';
            }
        }

        function sqrtCalc() {
            current = Math.sqrt(parseFloat(current)).toString();
            display.value = current;
        }

        function squareCalc() {
            var num = parseFloat(current);
            current = (num * num).toString();
            display.value = current;
        }
    </script>
</body>
</html>
