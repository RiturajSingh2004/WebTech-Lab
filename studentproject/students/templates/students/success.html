<!DOCTYPE html>
<html>
<head>
    <title>Registration Success</title>
    <style>
        body { font-family: Arial; background: #f0f0f0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        h2 { color: #27ae60; text-align: center; }
        .details { background: #ecf0f1; padding: 15px; border-radius: 5px; margin: 20px 0; }
        .details p { margin: 10px 0; }
        a { display: block; text-align: center; margin-top: 20px; color: #3498db; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>✓ Registration Successful!</h2>
        <div class="details">
            <p><strong>Name:</strong> {{ student.name }}</p>
            <p><strong>Email:</strong> {{ student.email }}</p>
            <p><strong>Age:</strong> {{ student.age }}</p>
            <p><strong>Course:</strong> {{ student.course }}</p>
        </div>
        <a href="{% url 'register' %}">← Register Another Student</a>
    </div>
</body>
</html>
