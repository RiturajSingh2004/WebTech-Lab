<!DOCTYPE html>
<html>
<head>
    <title>To-Do List</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 30px; }
        form { display: flex; gap: 10px; margin-bottom: 30px; }
        input[type="text"] { flex: 1; padding: 12px; border: 2px solid #3498db; border-radius: 5px; font-size: 16px; }
        button { padding: 12px 25px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #2980b9; }
        .task-list { list-style: none; }
        .task-item { background: #ecf0f1; padding: 15px; margin: 10px 0; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .task-title { flex: 1; font-size: 16px; color: #2c3e50; }
        .delete-btn { padding: 8px 15px; background: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .delete-btn:hover { background: #c0392b; }
        .empty { text-align: center; color: #7f8c8d; padding: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 My To-Do List</h1>
        
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="title" placeholder="Add a new task..." required>
            <button type="submit">Add</button>
        </form>
        
        <ul class="task-list">
            {% if tasks %}
                {% for task in tasks %}
                <li class="task-item">
                    <span class="task-title">{{ task.title }}</span>
                    <form method="POST" action="{% url 'delete_task' task.id %}" style="margin: 0;">
                        {% csrf_token %}
                        <button type="submit" class="delete-btn">Delete</button>
                    </form>
                </li>
                {% endfor %}
            {% else %}
                <div class="empty">No tasks yet. Add one above! 🎯</div>
            {% endif %}
        </ul>
    </div>
</body>
</html>
